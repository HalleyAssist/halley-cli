name: release

on:
  release:
    types:
      - published
  workflow_dispatch:

jobs:
  publish:
    permissions:
      contents: write

    strategy:
      fail-fast: false
      matrix:
        include:
          - rid: win-x64
            artifact_name: halley-cli-windows-amd64
          - rid: win-arm64
            artifact_name: halley-cli-windows-arm64
          - rid: linux-x64
            artifact_name: halley-cli-linux-amd64
          - rid: linux-arm64
            artifact_name: halley-cli-linux-arm64
          - rid: osx-x64
            artifact_name: halley-cli-macos-amd64
          - rid: osx-arm64
            artifact_name: halley-cli-macos-arm64

    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Run tests
        shell: bash
        run: bash ./scripts/run-with-core-dump-check.sh dotnet test Halley.slnx -c Release

      - name: Resolve version
        shell: bash
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          if [ "$GITHUB_EVENT_NAME" = "workflow_dispatch" ]; then
            VERSION="0.0.0-dev.${GITHUB_RUN_NUMBER}"
          fi
          echo "VERSION=$VERSION" >> "$GITHUB_ENV"

      - name: Publish CLI
        shell: bash
        run: |
          bash ./scripts/run-with-core-dump-check.sh \
            dotnet publish src/Halley.App.Cli/Halley.App.Cli.csproj \
              -c Release \
              -r ${{ matrix.rid }} \
              --self-contained true \
              -p:PublishSingleFile=true \
              -p:Version=${VERSION} \
              -p:SourceRevisionId=${{ github.sha }} \
              -o artifacts/${{ matrix.rid }}

      - name: Upload core dumps
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: core-dumps-${{ matrix.artifact_name }}
          if-no-files-found: ignore
          path: |
            core
            core.*
            **/core
            **/core.*
            /cores/core
            /cores/core.*

      - name: Archive artifact
        shell: bash
        run: |
          mkdir -p package
          cd artifacts/${{ matrix.rid }}
          zip -r ../../package/${{ matrix.artifact_name }}.zip .

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: package/${{ matrix.artifact_name }}.zip

      - name: Upload release asset
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v2
        with:
          files: package/${{ matrix.artifact_name }}.zip
