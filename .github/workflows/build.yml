name: build

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

jobs:
  dev-build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - rid: win-x64
            artifact_name: halley-cli-windows-amd64
            executable_name: Halley.App.Cli.exe
          - rid: linux-x64
            artifact_name: halley-cli-linux-amd64
            executable_name: Halley.App.Cli

    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Run tests
        shell: bash
        run: bash ./scripts/run-with-core-dump-check.sh dotnet test Halley.slnx -c Release

      - name: Publish CLI
        shell: bash
        run: |
          bash ./scripts/run-with-core-dump-check.sh \
            dotnet publish src/Halley.App.Cli/Halley.App.Cli.csproj \
              -c Release \
              -r ${{ matrix.rid }} \
              --self-contained true \
              -p:PublishSingleFile=true \
              -p:DebugSymbols=false \
              -p:DebugType=None \
              -p:Version=0.0.0-dev.${{ github.run_number }} \
              -p:SourceRevisionId=${{ github.sha }} \
              -o artifacts/${{ matrix.rid }}

      - name: Upload core dumps
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: core-dumps-${{ matrix.artifact_name }}
          if-no-files-found: ignore
          path: |
            core
            core.*
            **/core
            **/core.*
            /cores/core
            /cores/core.*

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: artifacts/${{ matrix.rid }}/${{ matrix.executable_name }}
